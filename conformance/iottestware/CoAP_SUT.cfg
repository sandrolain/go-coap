[LOGGING]
  LogFile := "/home/titan/logs/%e.%h-%r.%s"
  FileMask := LOG_ALL | DEBUG | MATCHING
  ConsoleMask := ERROR | WARNING | TESTCASE | STATISTICS | PORTEVENT
  LogSourceInfo := Yes
  AppendFile := No
  TimeStampFormat := DateTime
  LogEventTypes := Yes
  SourceInfoFormat := Single
  LogEntityName := Yes

[MODULE_PARAMETERS]

  # Remote address of the System Under Test.
  # Override at runtime via the entrypoint script (SUT_HOST / SUT_PORT env vars).
  PX_SERVER_ID := "sut";
  PX_SERVER_HOST := "SUT_HOST_PLACEHOLDER";
  PX_SERVER_PORT := SUT_PORT_PLACEHOLDER;

  # Resources exposed by the go-coap SUT server (see iottestware/sut/main.go).
  PX_DEFAULT_RESOURCE := "Simple_Resource";

  # /location-query is mapped to a handler that always returns 4.05
  PX_METHOD_NOT_ALLOWED_RESOURCE := "location-query";

  # /any has no handler -> mux returns 4.04
  PX_NOT_FOUND_RESOURCE := "any";

  PX_FIRST_LVL_RESOURCE  := "location1";
  PX_SECOND_LVL_RESOURCE := "New1";
  PX_THIRD_LVL_RESOURCE  := "New2";
  PX_NEW_RESOURCE        := "new";
  PX_STORAGE_RESOURCE    := "Storage_Resource";
  PX_SEPARATE_RESOURCE   := "separate";

[TESTPORT_PARAMETERS]

[MAIN_CONTROLLER]

[EXECUTE]
  CoAP_Testcases.control
